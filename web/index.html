<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoRa Deep Reasoning Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0b08;
  --bg-card: hsl(45 15% 10%);
  --bg-user: hsl(45 8% 13%);
  --bg-lora: hsl(45 10% 10%);
  --bg-deep: #0c1210;
  --border: hsl(45 8% 16%);
  --border-deep: rgba(16, 185, 129, 0.15);
  --text: #d4d4d0;
  --text-dim: #6b6d65;
  --text-bright: #f0f0ec;
  --primary: hsl(163 92% 25%);
  --primary-glow: rgba(15, 155, 122, 0.12);
  --fire: #d45454;
  --earth: #c9944a;
  --metal: #8a9bb0;
  --water: #4a8cc9;
  --wood: #5ab870;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Scrollbar ──────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Top Bar ────────────────────────── */
.topbar {
  height: 48px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  flex-shrink: 0;
  padding: 0 1rem;
  background: var(--bg);
}

.topbar-brand {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-bright);
  letter-spacing: 0.06em;
}

.topbar-brand span { color: var(--primary); }

.topbar-elements {
  display: flex;
  gap: 0.75rem;
}

.el-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
}

.topbar-stat {
  font-size: 0.65rem;
  color: var(--text-dim);
  font-family: var(--mono);
}

/* ── Chat Area ──────────────────────── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem 0;
}

.chat-container {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 1rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

/* ── Welcome ────────────────────────── */
.welcome {
  text-align: center;
  padding: 4rem 1rem 2rem;
}

.welcome h1 {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.02em;
}

.welcome h1 span { color: var(--primary); }

.welcome p {
  margin-top: 0.5rem;
  color: var(--text-dim);
  font-size: 0.85rem;
  line-height: 1.6;
}

.welcome-elements {
  display: flex;
  justify-content: center;
  gap: 1.25rem;
  margin-top: 1.25rem;
  flex-wrap: wrap;
}

.welcome-el {
  font-size: 0.68rem;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ── Messages ───────────────────────── */

/* User message — right aligned */
.msg-user {
  display: flex;
  justify-content: flex-end;
  animation: fadeUp 0.3s ease;
}

.msg-user-bubble {
  max-width: 85%;
  background: var(--bg-user);
  border: 1px solid var(--border);
  border-radius: 12px 12px 2px 12px;
  padding: 0.85rem 1.1rem;
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--text-bright);
}

/* LoRa message — left aligned */
.msg-lora {
  display: flex;
  justify-content: flex-start;
  animation: fadeUp 0.3s ease;
}

.msg-lora-bubble {
  max-width: 92%;
  width: 100%;
  background: var(--bg-deep);
  border: 1px solid var(--border-deep);
  border-radius: 12px 12px 12px 2px;
  padding: 1.25rem 1.4rem;
  position: relative;
}

/* Speech text */
.lora-speech {
  font-size: 0.95rem;
  line-height: 1.85;
  color: var(--text-bright);
}

.lora-speech p { margin-bottom: 1rem; }
.lora-speech p:last-child { margin-bottom: 0; }

/* Metadata bar under speech */
.lora-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 1rem;
  padding-top: 0.85rem;
  border-top: 1px solid var(--border);
}

.meta-chip {
  font-size: 0.65rem;
  font-family: var(--mono);
  color: var(--text-dim);
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 0.25rem 0.6rem;
  display: flex;
  gap: 0.35rem;
  align-items: center;
}

.meta-val { color: var(--text); font-weight: 600; }

/* Dig deeper button */
.dig-section {
  margin-top: 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.btn-dig {
  background: transparent;
  color: var(--primary);
  border: 1px solid var(--primary);
  padding: 0.45rem 1.25rem;
  border-radius: 7px;
  font-family: var(--font);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-dig:hover { background: var(--primary-glow); }
.btn-dig:disabled { opacity: 0.4; cursor: not-allowed; }

.dig-hint {
  font-size: 0.7rem;
  color: var(--text-dim);
  font-style: italic;
}

/* ── Expandable Details ─────────────── */
.details-toggle {
  margin-top: 0.85rem;
  font-size: 0.75rem;
  color: var(--primary);
  cursor: pointer;
  user-select: none;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
}

.details-toggle:hover { text-decoration: underline; }

.details-body {
  display: none;
  margin-top: 0.85rem;
}

.details-body.open { display: block; }

/* Trajectory cards */
.traj-list {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  margin-top: 0.5rem;
}

.traj-item {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.85rem 1rem;
}

.traj-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.3rem;
}

.traj-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-bright);
  word-break: break-word;
}

.traj-conf {
  font-size: 0.7rem;
  font-family: var(--mono);
  font-weight: 600;
  min-width: 40px;
  text-align: right;
}

.traj-desc {
  font-size: 0.78rem;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 0.5rem;
}

.traj-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.traj-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}

.traj-tags {
  display: flex;
  gap: 0.4rem;
  margin-top: 0.5rem;
  flex-wrap: wrap;
}

.traj-tag {
  font-size: 0.6rem;
  padding: 0.12rem 0.45rem;
  border-radius: 3px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.traj-tag.hidden { background: rgba(212,84,84,0.12); color: var(--fire); }
.traj-tag.visible { background: rgba(138,155,176,0.1); color: var(--metal); }

/* Domain section */
.domain-section {
  margin-top: 0.75rem;
}

.domain-block {
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 0.5rem;
  overflow: hidden;
}

.domain-header {
  padding: 0.65rem 0.85rem;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text);
  user-select: none;
  transition: background 0.15s;
}

.domain-header:hover { background: rgba(255,255,255,0.02); }

.domain-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 0.5rem;
}

.domain-meta {
  font-size: 0.65rem;
  color: var(--text-dim);
  font-family: var(--mono);
}

.domain-arrow {
  font-size: 0.6rem;
  color: var(--text-dim);
  transition: transform 0.2s;
  margin-left: 0.5rem;
}

.domain-block.open .domain-arrow { transform: rotate(180deg); }

.domain-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.domain-block.open .domain-body { max-height: 3000px; }

.domain-content {
  padding: 0 0.85rem 0.85rem;
  font-size: 0.75rem;
  color: var(--text-dim);
  line-height: 1.6;
}

.var-row {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.15rem 0;
}

.var-dir { font-weight: 700; font-size: 0.7rem; min-width: 12px; text-align: center; }
.var-dir.positive { color: var(--wood); }
.var-dir.negative { color: var(--fire); }
.var-dir.neutral { color: var(--metal); }
.var-name { font-family: var(--mono); font-size: 0.68rem; color: var(--text); }
.var-conf { margin-left: auto; font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim); }
.var-hidden-tag { font-size: 0.55rem; background: rgba(212,84,84,0.12); color: var(--fire); padding: 0.08rem 0.3rem; border-radius: 3px; font-weight: 600; text-transform: uppercase; }

/* Ke cycle */
.ke-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.35rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.ke-row:last-child { border-bottom: none; }

.ke-label {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--text-dim);
  min-width: 140px;
  white-space: nowrap;
}

.ke-bar {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.ke-fill {
  height: 100%;
  border-radius: 2px;
}

.ke-score {
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 600;
  min-width: 32px;
  text-align: right;
}

/* Convergence */
.conv-row {
  display: flex;
  gap: 0.75rem;
  overflow-x: auto;
  padding: 0.4rem 0;
}

.conv-box {
  min-width: 90px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.6rem;
  text-align: center;
}

.conv-label {
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  font-weight: 600;
  margin-bottom: 0.3rem;
}

.conv-val {
  font-family: var(--mono);
  font-size: 0.95rem;
  font-weight: 700;
}

.conv-val.yes { color: var(--wood); }
.conv-val.no { color: var(--fire); }

.conv-sub {
  font-size: 0.6rem;
  color: var(--text-dim);
  margin-top: 0.2rem;
  line-height: 1.3;
}

/* Funnel */
.funnel-pass {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.35rem 0;
}

.funnel-label {
  font-size: 0.65rem;
  color: var(--text-dim);
  font-weight: 600;
  min-width: 50px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.funnel-bars {
  flex: 1;
  display: flex;
  gap: 3px;
  align-items: center;
}

.funnel-seg {
  height: 16px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.58rem;
  font-family: var(--mono);
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  min-width: 28px;
}

.funnel-seg.kept { background: var(--wood); }
.funnel-seg.work { background: var(--earth); }
.funnel-seg.stable { background: var(--water); }
.funnel-seg.cached { background: rgba(255,255,255,0.06); color: var(--text-dim); }

/* Raw preview */
.raw-box {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 0.6rem;
  margin-top: 0.5rem;
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 160px;
  overflow-y: auto;
}

/* Section label inside details */
.detail-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  font-weight: 600;
  margin: 0.85rem 0 0.4rem;
}

.detail-label:first-child { margin-top: 0; }

/* ── Thinking Indicator ─────────────── */
.msg-thinking {
  display: flex;
  justify-content: flex-start;
  animation: fadeUp 0.3s ease;
}

.thinking-bubble {
  background: var(--bg-deep);
  border: 1px solid var(--border-deep);
  border-radius: 12px 12px 12px 2px;
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.thinking-dots {
  display: flex;
  gap: 4px;
}

.thinking-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--primary);
  animation: dotPulse 1.4s infinite;
}

.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

.thinking-label {
  font-size: 0.8rem;
  color: var(--text-dim);
}

.thinking-stage {
  font-size: 0.7rem;
  color: var(--primary);
  font-weight: 500;
  margin-left: 0.5rem;
}

/* ── Input Bar ──────────────────────── */
.input-bar {
  border-top: 1px solid var(--border);
  background: var(--bg);
  padding: 0.85rem 1rem;
  flex-shrink: 0;
}

.input-wrap {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  gap: 0.6rem;
  align-items: flex-end;
}

.input-wrap textarea {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.7rem 1rem;
  color: var(--text-bright);
  font-family: var(--font);
  font-size: 0.9rem;
  line-height: 1.5;
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 160px;
  transition: border-color 0.2s;
}

.input-wrap textarea:focus {
  border-color: var(--primary);
}

.input-wrap textarea::placeholder { color: var(--text-dim); }

.btn-send {
  background: var(--primary);
  color: #fff;
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s;
  font-size: 1.1rem;
}

.btn-send:hover { opacity: 0.85; }
.btn-send:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Animations ─────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ── Responsive ─────────────────────── */
@media (max-width: 600px) {
  .topbar-elements { display: none; }
  .topbar-stat { display: none; }
  .msg-user-bubble { max-width: 92%; }
  .ke-label { min-width: 90px; font-size: 0.6rem; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-brand">LoRa <span>Deep Reasoning</span></div>
  <div class="topbar-elements">
    <span class="el-dot" style="background:var(--earth)"></span>
    <span class="el-dot" style="background:var(--metal)"></span>
    <span class="el-dot" style="background:var(--water)"></span>
    <span class="el-dot" style="background:var(--wood)"></span>
    <span class="el-dot" style="background:var(--fire)"></span>
  </div>
  <div class="topbar-stat" id="topbarStat">5 domains &middot; 63 concepts</div>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea">
  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
      <h1>LoRa <span>Deep Reasoning</span></h1>
      <p>5 domains &middot; 63 concepts &middot; Wu Xing dual-cycle architecture<br>
      Describe your situation. LoRa will reason about it.</p>
      <div class="welcome-elements">
        <span class="welcome-el"><span class="el-dot" style="background:var(--earth)"></span> Physics</span>
        <span class="welcome-el"><span class="el-dot" style="background:var(--metal)"></span> Mathematics</span>
        <span class="welcome-el"><span class="el-dot" style="background:var(--water)"></span> Psychology</span>
        <span class="welcome-el"><span class="el-dot" style="background:var(--wood)"></span> Philosophy</span>
        <span class="welcome-el"><span class="el-dot" style="background:var(--fire)"></span> Chemistry</span>
      </div>
    </div>
  </div>
</div>

<!-- Input Bar -->
<div class="input-bar">
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="What's on your mind?" oninput="autoResize(this)"></textarea>
    <button class="btn-send" id="btnSend" onclick="send()">&#x2191;</button>
  </div>
</div>

<script>
const API = window.location.origin;
let lastQuestion = '';
let isProcessing = false;

const DC = {
  physics: { color: '#c9944a', label: 'Physics (Earth)' },
  mathematics: { color: '#8a9bb0', label: 'Mathematics (Metal)' },
  psychology: { color: '#4a8cc9', label: 'Psychology (Water)' },
  philosophy: { color: '#5ab870', label: 'Philosophy (Wood)' },
  chemistry: { color: '#d45454', label: 'Chemistry (Fire)' },
};

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function scrollBottom() {
  const area = document.getElementById('chatArea');
  requestAnimationFrame(() => area.scrollTop = area.scrollHeight);
}

function addUserMsg(text) {
  document.getElementById('welcome')?.remove();
  const div = document.createElement('div');
  div.className = 'msg-user';
  div.innerHTML = `<div class="msg-user-bubble">${esc(text)}</div>`;
  document.getElementById('chatContainer').appendChild(div);
  scrollBottom();
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'msg-thinking';
  div.id = 'thinkingMsg';
  div.innerHTML = `
    <div class="thinking-bubble">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <span class="thinking-label">LoRa is reasoning</span>
      <span class="thinking-stage" id="thinkingStage"></span>
    </div>
  `;
  document.getElementById('chatContainer').appendChild(div);
  scrollBottom();
  animateStages();
}

function removeThinking() {
  document.getElementById('thinkingMsg')?.remove();
  if (window._stageInterval) clearInterval(window._stageInterval);
}

function animateStages() {
  const stages = [
    'Chemistry reads...', 'Manifold opening...', 'Dual cycles...',
    'Bayesian update...', 'Convergence check...', 'Fragility gate...',
    'Speech module...'
  ];
  let i = 0;
  const el = document.getElementById('thinkingStage');
  if (!el) return;
  el.textContent = stages[0];
  window._stageInterval = setInterval(() => {
    i = (i + 1) % stages.length;
    if (el) el.textContent = stages[i];
    scrollBottom();
  }, 2500);
}

function addLoraMsg(data) {
  const div = document.createElement('div');
  div.className = 'msg-lora';

  const s = data.stats || {};
  const speechHtml = formatSpeech(data.speech || 'No response generated.');

  let html = `<div class="msg-lora-bubble">
    <div class="lora-speech">${speechHtml}</div>

    <!-- Meta -->
    <div class="lora-meta">
      <div class="meta-chip"><span class="meta-val">${s.calls || 0}</span> calls</div>
      <div class="meta-chip"><span class="meta-val">${((s.tokens || 0) / 1000).toFixed(1)}k</span> tokens</div>
      <div class="meta-chip"><span class="meta-val">$${(s.cost || 0).toFixed(2)}</span></div>
      <div class="meta-chip"><span class="meta-val">${s.iterations || 0}</span> iters</div>
      <div class="meta-chip"><span class="meta-val">${s.converged ? 'Yes' : 'No'}</span> conv</div>
      <div class="meta-chip"><span class="meta-val">${((data.total_time_ms || 0) / 1000).toFixed(1)}s</span></div>
      <div class="meta-chip">${esc(data.delivery_mode || '—')} mode</div>
    </div>`;

  // Dig deeper
  if (data.dig_deeper) {
    html += `<div class="dig-section">
      <button class="btn-dig" onclick="digDeeper(this)">Dig Deeper</button>
      <span class="dig-hint">${esc(data.dig_deeper)}</span>
    </div>`;
  }

  // Details toggle
  html += `<div class="details-toggle" onclick="toggleDetails(this)">&#x25B6; Show engine details</div>`;
  html += `<div class="details-body">`;

  // Trajectories
  const trajs = data.trajectories || [];
  if (trajs.length) {
    html += `<div class="detail-label">Trajectories (${trajs.length})</div><div class="traj-list">`;
    for (const t of trajs) {
      const conf = Math.round((t.confidence || 0) * 100);
      const color = conf >= 80 ? 'var(--wood)' : conf >= 50 ? 'var(--earth)' : 'var(--fire)';
      html += `<div class="traj-item">
        <div class="traj-head">
          <span class="traj-name">${esc(t.name)}</span>
          <span class="traj-conf" style="color:${color}">${conf}%</span>
        </div>
        <div class="traj-desc">${esc(t.desc || '')}</div>
        <div class="traj-bar"><div class="traj-bar-fill" style="width:${conf}%;background:${color}"></div></div>
        <div class="traj-tags">
          ${t.hidden ? '<span class="traj-tag hidden">Hidden</span>' : '<span class="traj-tag visible">Visible</span>'}
          ${t.bias ? `<span class="traj-tag visible">${esc(t.bias)}</span>` : ''}
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  // Domains
  const domains = data.domains || {};
  const domOrder = ['physics','mathematics','psychology','philosophy','chemistry'];
  const hasDomains = domOrder.some(d => domains[d]);
  if (hasDomains) {
    html += `<div class="detail-label">Domain Analysis</div><div class="domain-section">`;
    for (const dom of domOrder) {
      const d = domains[dom];
      if (!d) continue;
      const info = DC[dom];
      const pCount = (d.perspectives||[]).length;
      const rCount = (d.root_causes||[]).length;

      let bodyHtml = '';
      for (const p of (d.perspectives||[])) {
        bodyHtml += `<div style="margin-bottom:0.5rem"><div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.06em;color:${info.color};font-weight:600;margin-bottom:0.2rem">${esc(p.framework)}</div>`;
        for (const v of (p.variables||[])) {
          const dc = v.dir||'neutral';
          const sym = dc==='positive'?'+':dc==='negative'?'-':'~';
          bodyHtml += `<div class="var-row"><span class="var-dir ${dc}">${sym}</span><span class="var-name">${esc(v.name)}</span>${v.hidden?'<span class="var-hidden-tag">hidden</span>':''}<span class="var-conf">${Math.round((v.conf||0)*100)}%</span></div>`;
        }
        bodyHtml += `</div>`;
      }
      if (rCount) {
        bodyHtml += `<div style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);font-weight:600;margin:0.5rem 0 0.25rem">Root Causes</div>`;
        for (const rc of d.root_causes) {
          bodyHtml += `<div style="padding:0.3rem 0;border-bottom:1px solid rgba(255,255,255,0.03)"><span style="font-size:0.75rem;font-weight:600;color:var(--fire)">${esc(rc.name)}</span> <span style="font-family:var(--mono);font-size:0.65rem;color:var(--text-dim)">${Math.round((rc.confidence||0)*100)}%</span>${rc.hidden?'<span class="var-hidden-tag" style="margin-left:0.3rem">hidden</span>':''}<div style="font-size:0.7rem;color:var(--text-dim);margin-top:0.15rem">${esc(rc.desc)}</div></div>`;
        }
      }
      if (d.raw_preview) bodyHtml += `<div class="raw-box">${esc(d.raw_preview)}</div>`;

      html += `<div class="domain-block"><div class="domain-header" onclick="this.parentElement.classList.toggle('open')"><span><span class="domain-dot" style="background:${info.color}"></span>${info.label}</span><span><span class="domain-meta">${pCount}p &middot; ${rCount}r</span><span class="domain-arrow">&#x25BC;</span></span></div><div class="domain-body"><div class="domain-content">${bodyHtml}</div></div></div>`;
    }
    html += `</div>`;
  }

  // Ke cycle
  const ke = data.ke || [];
  if (ke.length) {
    html += `<div class="detail-label">Ke Cycle (${ke.length} pairs)</div>`;
    for (const k of ke) {
      const sc = k.scrutiny || 0;
      const pct = Math.round(sc * 100);
      const col = sc > 0.5 ? 'var(--fire)' : sc > 0.3 ? 'var(--earth)' : 'var(--wood)';
      html += `<div class="ke-row"><span class="ke-label">${esc(k.challenger)} &rarr; ${esc(k.target)}</span><div class="ke-bar"><div class="ke-fill" style="width:${pct}%;background:${col}"></div></div><span class="ke-score" style="color:${col}">${sc.toFixed(2)}</span></div>`;
    }
  }

  // Convergence
  const conv = data.convergence || [];
  if (conv.length) {
    html += `<div class="detail-label">Convergence</div><div class="conv-row">`;
    for (const c of conv) {
      const g = (c.gibbs||0).toFixed(3);
      const cls = c.converged ? 'yes' : 'no';
      html += `<div class="conv-box"><div class="conv-label">Iter ${c.iter||'?'}</div><div class="conv-val ${cls}">${g}</div><div class="conv-sub">&Delta;${(c.posterior_delta||0).toFixed(3)} | Ke ${(c.ke_scrutiny||0).toFixed(2)}</div></div>`;
    }
    html += `</div>`;
  }

  // Funnel
  const funnel = data.funnel || [];
  if (funnel.length) {
    const maxT = Math.max(...funnel.map(f=>(f.kept||0)+(f.cached||0)+(f.needs_work||0)+(f.stable||0)),1);
    html += `<div class="detail-label">Funnel</div>`;
    for (let i=0; i<funnel.length; i++) {
      const f = funnel[i];
      const sc = 200;
      html += `<div class="funnel-pass"><span class="funnel-label">Pass ${i+1}</span><div class="funnel-bars">`;
      if (f.kept) html += `<div class="funnel-seg kept" style="width:${Math.max((f.kept/maxT)*sc,28)}px">${f.kept}</div>`;
      if (f.needs_work) html += `<div class="funnel-seg work" style="width:${Math.max((f.needs_work/maxT)*sc,28)}px">${f.needs_work}</div>`;
      if (f.stable) html += `<div class="funnel-seg stable" style="width:${Math.max((f.stable/maxT)*sc,28)}px">${f.stable}</div>`;
      if (f.cached) html += `<div class="funnel-seg cached" style="width:${Math.max((f.cached/maxT)*sc,28)}px">${f.cached}</div>`;
      html += `</div></div>`;
    }
  }

  html += `</div></div>`; // close details-body + bubble

  div.innerHTML = html;
  document.getElementById('chatContainer').appendChild(div);
  scrollBottom();
}

function formatSpeech(text) {
  // Convert paragraphs
  return text.split(/\n\n+/).map(p => `<p>${esc(p.trim())}</p>`).join('');
}

function toggleDetails(el) {
  const body = el.nextElementSibling;
  const isOpen = body.classList.toggle('open');
  el.innerHTML = isOpen ? '&#x25BC; Hide engine details' : '&#x25B6; Show engine details';
  scrollBottom();
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isProcessing) return;

  lastQuestion = text;
  input.value = '';
  autoResize(input);

  addUserMsg(text);
  addThinking();

  isProcessing = true;
  document.getElementById('btnSend').disabled = true;

  try {
    const res = await fetch(`${API}/api/trace`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: text }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || `Server error ${res.status}`);
    }

    const data = await res.json();
    removeThinking();
    addLoraMsg(data);

  } catch (err) {
    removeThinking();
    const div = document.createElement('div');
    div.className = 'msg-lora';
    div.innerHTML = `<div class="msg-lora-bubble" style="border-color:rgba(212,84,84,0.25)"><div style="color:var(--fire);font-weight:600;font-size:0.85rem">Error</div><div style="color:var(--text-dim);font-size:0.8rem;margin-top:0.3rem">${esc(err.message)}</div></div>`;
    document.getElementById('chatContainer').appendChild(div);
    scrollBottom();
  } finally {
    isProcessing = false;
    document.getElementById('btnSend').disabled = false;
    document.getElementById('input').focus();
  }
}

async function digDeeper(btn) {
  if (!lastQuestion || isProcessing) return;

  btn.disabled = true;
  btn.textContent = 'Digging deeper...';

  addThinking();
  isProcessing = true;

  try {
    const res = await fetch(`${API}/api/trace`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: lastQuestion, max_iterations: 6 }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || `Server error ${res.status}`);
    }

    const data = await res.json();
    removeThinking();
    addLoraMsg(data);
    btn.closest('.dig-section').remove();

  } catch (err) {
    removeThinking();
    btn.disabled = false;
    btn.textContent = 'Dig Deeper';
    alert('Error: ' + err.message);
  } finally {
    isProcessing = false;
  }
}

// Enter to send, Shift+Enter for newline
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

document.getElementById('input').focus();
</script>
