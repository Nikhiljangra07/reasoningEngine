name: CI

on:
  push:
    branches: [main, chaos-amp]
  pull_request:

jobs:
  build:
    name: Install + compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile all source (syntax gate)
        run: python -m compileall -q src
      # NOTE: the test files (tests/*.py) are direct-run scripts, not pytest, and
      # several exercise external clients (Playwright, MCP router, Context7). They
      # pass locally against those services but are not sandbox-safe, so CI runs a
      # dependency-install + full syntax compile as the automated gate. Run the
      # suite locally per tests/README.md.
